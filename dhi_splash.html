<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demographic Health Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #1a3a6e;
  --accent-deep: #0f2347;
  --gold:   #c49a28;
  --gold2:  #e0b54a;
  --font-display: 'Lora', Georgia, serif;
  --font-mono:    'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--font-display);
  background:
    radial-gradient(ellipse at 50% 35%, #2a4d8a 0%, var(--accent) 45%, var(--accent-deep) 100%);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
}

/* Subtle grid backdrop */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
}

/* Decorative oversized "DHI" watermark */
body::after {
  content: 'DHI';
  position: absolute;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 38vw;
  color: rgba(255,255,255,0.025);
  letter-spacing: -0.04em;
  bottom: -8vw;
  right: -2vw;
  line-height: 1;
  pointer-events: none;
  user-select: none;
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gold2);
  margin-bottom: 24px;
  position: relative;
  z-index: 2;
}

.title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(2.6rem, 6vw, 5rem);
  line-height: 1.05;
  letter-spacing: -0.015em;
  margin-bottom: 6px;
  position: relative;
  z-index: 2;
}
.title em { font-style: italic; color: var(--gold2); font-weight: 600; }

.subtitle {
  font-size: clamp(0.95rem, 1.4vw, 1.15rem);
  color: rgba(255,255,255,0.65);
  font-style: italic;
  margin-bottom: 36px;
  max-width: 560px;
  line-height: 1.5;
  position: relative;
  z-index: 2;
}

/* ── SVG graphic ─────────────────────────────────────── */
.graphic-wrap {
  position: relative;
  width: clamp(280px, 36vmin, 420px);
  aspect-ratio: 1 / 1;
  margin-bottom: 40px;
  z-index: 2;
}
.graphic-wrap svg { width: 100%; height: 100%; display: block; overflow: visible; }

/* Outer slow rotation */
.ring-rotate { transform-origin: 50% 50%; animation: spin 80s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Pulsing rings */
.pulse-ring {
  fill: none;
  stroke: var(--gold2);
  stroke-width: 1;
  opacity: 0;
  transform-origin: 50% 50%;
  animation: pulse 4s cubic-bezier(0.22, 1, 0.36, 1) infinite;
}
.pulse-ring.r2 { animation-delay: 1.3s; }
.pulse-ring.r3 { animation-delay: 2.6s; }
@keyframes pulse {
  0%   { transform: scale(0.55); opacity: 0; }
  20%  { opacity: 0.55; }
  100% { transform: scale(1.15); opacity: 0; }
}

/* Small human silhouettes — gentle breathing */
.person {
  animation: dotBreath 3.6s ease-in-out infinite;
  transform-box: fill-box;
  transform-origin: center;
}
@keyframes dotBreath {
  0%, 100% { opacity: 0.45; }
  50%      { opacity: 1; }
}

/* Central family pair — slow heartbeat scale */
.center-family {
  transform-box: fill-box;
  transform-origin: center;
  animation: heartbeat 2.8s ease-in-out infinite;
}
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.05); }
}

/* ── Button ──────────────────────────────────────────── */
.cta {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 16px 38px;
  background: var(--gold);
  color: var(--accent-deep);
  border: none;
  border-radius: 999px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.08rem;
  letter-spacing: 0.02em;
  cursor: pointer;
  text-decoration: none;
  box-shadow:
    0 0 0 1px rgba(196,154,40,0.4),
    0 8px 24px rgba(196,154,40,0.25),
    0 16px 60px rgba(0,0,0,0.35);
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  position: relative;
  z-index: 2;
}
.cta:hover {
  background: var(--gold2);
  transform: translateY(-2px);
  box-shadow:
    0 0 0 1px rgba(224,181,74,0.5),
    0 12px 32px rgba(224,181,74,0.35),
    0 20px 70px rgba(0,0,0,0.4);
}
.cta:active { transform: translateY(0); }
.cta-arrow {
  display: inline-block;
  font-size: 1.1rem;
  transition: transform 0.18s ease;
}
.cta:hover .cta-arrow { transform: translateX(4px); }

.footnote {
  position: absolute;
  bottom: 22px;
  left: 0; right: 0;
  font-family: var(--font-mono);
  font-size: 0.66rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  z-index: 2;
}
</style>
</head>
<body>

<div class="eyebrow">236 countries · 1965 — 2050</div>

<h1 class="title">Demographic <em>Health</em> Index</h1>
<p class="subtitle">A unified measure of population sustainability.</p>

<div class="graphic-wrap">
  <svg viewBox="-100 -100 200 200" aria-hidden="true">
    <!-- expanding pulse rings (life radiating outward) -->
    <circle class="pulse-ring"     cx="0" cy="0" r="55"/>
    <circle class="pulse-ring r2"  cx="0" cy="0" r="55"/>
    <circle class="pulse-ring r3"  cx="0" cy="0" r="55"/>

    <!-- faint outer concentric rings -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="62" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.4" stroke-dasharray="2 3"/>

    <!-- Surrounding population — small human silhouettes coloured by DHI band -->
    <g>
      <!-- Demographically Healthy (green) -->
      <g class="person" fill="#22c55e" transform="translate(-58,-30)" style="animation-delay:0s">
        <circle cx="0" cy="-4" r="1.9"/>
        <path d="M-2.6,-2 a2.6,2.6 0 0 1 5.2,0 v4 a2.4,2.4 0 0 1 -1.4,2.2 v3.5 h-2.4 v-3.5 a2.4,2.4 0 0 1 -1.4,-2.2 z"/>
      </g>
      <g class="person" fill="#22c55e" transform="translate(-20,-66)" style="animation-delay:0.4s">
        <circle cx="0" cy="-4" r="1.9"/>
        <path d="M-2.6,-2 a2.6,2.6 0 0 1 5.2,0 v4 a2.4,2.4 0 0 1 -1.4,2.2 v3.5 h-2.4 v-3.5 a2.4,2.4 0 0 1 -1.4,-2.2 z"/>
      </g>
      <g class="person" fill="#22c55e" transform="translate(46,-50)" style="animation-delay:0.8s">
        <circle cx="0" cy="-4" r="1.9"/>
        <path d="M-2.6,-2 a2.6,2.6 0 0 1 5.2,0 v4 a2.4,2.4 0 0 1 -1.4,2.2 v3.5 h-2.4 v-3.5 a2.4,2.4 0 0 1 -1.4,-2.2 z"/>
      </g>

      <!-- Under Pressure (yellow) -->
      <g class="person" fill="#eab308" transform="translate(-72,8)" style="animation-delay:1.2s">
        <circle cx="0" cy="-4" r="1.9"/>
        <path d="M-2.6,-2 a2.6,2.6 0 0 1 5.2,0 v4 a2.4,2.4 0 0 1 -1.4,2.2 v3.5 h-2.4 v-3.5 a2.4,2.4 0 0 1 -1.4,-2.2 z"/>
      </g>
      <g class="person" fill="#eab308" transform="translate(70,-12)" style="animation-delay:1.6s">
        <circle cx="0" cy="-4" r="1.9"/>
        <path d="M-2.6,-2 a2.6,2.6 0 0 1 5.2,0 v4 a2.4,2.4 0 0 1 -1.4,2.2 v3.5 h-2.4 v-3.5 a2.4,2.4 0 0 1 -1.4,-2.2 z"/>
      </g>
      <g class="person" fill="#eab308" transform="translate(-32,38)" style="animation-delay:2.0s">
        <circle cx="0" cy="-4" r="1.9"/>
        <path d="M-2.6,-2 a2.6,2.6 0 0 1 5.2,0 v4 a2.4,2.4 0 0 1 -1.4,2.2 v3.5 h-2.4 v-3.5 a2.4,2.4 0 0 1 -1.4,-2.2 z"/>
      </g>

      <!-- Serious Decline (orange) -->
      <g class="person" fill="#f97316" transform="translate(34,40)" style="animation-delay:2.4s">
        <circle cx="0" cy="-4" r="1.9"/>
        <path d="M-2.6,-2 a2.6,2.6 0 0 1 5.2,0 v4 a2.4,2.4 0 0 1 -1.4,2.2 v3.5 h-2.4 v-3.5 a2.4,2.4 0 0 1 -1.4,-2.2 z"/>
      </g>
      <g class="person" fill="#f97316" transform="translate(60,28)" style="animation-delay:2.8s">
        <circle cx="0" cy="-4" r="1.9"/>
        <path d="M-2.6,-2 a2.6,2.6 0 0 1 5.2,0 v4 a2.4,2.4 0 0 1 -1.4,2.2 v3.5 h-2.4 v-3.5 a2.4,2.4 0 0 1 -1.4,-2.2 z"/>
      </g>

      <!-- Critical (red) -->
      <g class="person" fill="#ef4444" transform="translate(-58,52)" style="animation-delay:3.2s">
        <circle cx="0" cy="-4" r="1.9"/>
        <path d="M-2.6,-2 a2.6,2.6 0 0 1 5.2,0 v4 a2.4,2.4 0 0 1 -1.4,2.2 v3.5 h-2.4 v-3.5 a2.4,2.4 0 0 1 -1.4,-2.2 z"/>
      </g>

      <!-- Complete Crisis (dark red) -->
      <g class="person" fill="#7f1d1d" transform="translate(8,68)" style="animation-delay:3.6s">
        <circle cx="0" cy="-4" r="1.9"/>
        <path d="M-2.6,-2 a2.6,2.6 0 0 1 5.2,0 v4 a2.4,2.4 0 0 1 -1.4,2.2 v3.5 h-2.4 v-3.5 a2.4,2.4 0 0 1 -1.4,-2.2 z"/>
      </g>
    </g>

    <!-- Central family — parent + child (the source of new generations) -->
    <g class="center-family" fill="#e0b54a">
      <!-- Parent -->
      <g transform="translate(-7,-2)">
        <circle cx="0" cy="-13" r="4.2"/>
        <path d="M-5.2,-9 a5.2,5.2 0 0 1 10.4,0 v8 a4.6,4.6 0 0 1 -2.6,4.2 v6.8 h-4.6 v-6.8 a4.6,4.6 0 0 1 -2.6,-4.2 z"/>
      </g>
      <!-- Child (held in front-side, slightly raised) -->
      <g transform="translate(7,4)">
        <circle cx="0" cy="-9" r="2.8"/>
        <path d="M-3.5,-6 a3.5,3.5 0 0 1 7,0 v5.5 a3.1,3.1 0 0 1 -1.6,2.8 v4.5 h-3.1 v-4.5 a3.1,3.1 0 0 1 -1.6,-2.8 z"/>
      </g>
      <!-- Tiny heart between them -->
      <path d="M0,-8 c -1.4,-2.2 -4.2,-2.2 -4.2,0.4 c 0,1.6 2.1,3.4 4.2,5 c 2.1,-1.6 4.2,-3.4 4.2,-5 c 0,-2.6 -2.8,-2.6 -4.2,-0.4 z"
            fill="#e0b54a" opacity="0.85" transform="translate(0,-12) scale(0.55)">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/>
      </path>
    </g>
  </svg>
</div>

<a href="dhi_combined.html" class="cta">
  Enter the Index
  <span class="cta-arrow">→</span>
</a>

</body>
</html>
